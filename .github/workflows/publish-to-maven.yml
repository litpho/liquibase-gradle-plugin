name: Publish to Maven Central

on:
  #push:
    # Pattern matched against refs/tags
    # https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#patterns-to-match-branches-and-tags
    #tags:
      #- Release_*
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 'Set up Java version'
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '17'
          distribution: temurin
          cache: gradle

      - name: 'Make gradlew executable'
        run: chmod +x ./gradlew

      - name: Configure AWS credentials for vault access
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: ${{ secrets.LIQUIBASE_VAULT_OIDC_ROLE_ARN }}
          aws-region: us-east-1

      - name: Get secrets from vault
        id: vault-secrets
        uses: aws-actions/aws-secretsmanager-get-secrets@3a411b6ec5cace3d626412dd917e7bfeac242cfa # v3.0.0
        with:
          secret-ids: |
            ,/vault/liquibase
          parse-json-secrets: true

      - name: 'Create Docker Image, Publish to Registry, and Deploy to Container App'
        env:
            MAVEN_USERNAME: ${{ env.SONATYPE_USERNAME }}
            MAVEN_PASSWORD: ${{ env.SONATYPE_TOKEN }}
        run: |
          ./gradlew -PmavenCentralUsername=${MAVEN_USERNAME} \
                    -PmavenCentralPassword=${MAVEN_PASSWORD} \
                    publish
